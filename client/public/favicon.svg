<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- 배경 둥근 사각형 -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- 자막 바 (하단 넓은 바) -->
  <rect x="4" y="19" width="24" height="9" rx="2.5" fill="rgba(255,255,255,0.15)"/>
  <!-- 텍스트 라인 1 -->
  <rect x="7" y="22" width="14" height="2" rx="1" fill="white"/>
  <!-- 텍스트 라인 2 -->
  <rect x="7" y="25.5" width="10" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>
  <!-- 상단 재생/파형 심볼 (음성 → 자막 암시) -->
  <rect x="6" y="7" width="3" height="8" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="11" y="5" width="3" height="12" rx="1.5" fill="white"/>
  <rect x="16" y="8" width="3" height="7" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="21" y="6" width="3" height="10" rx="1.5" fill="white"/>
</svg>
